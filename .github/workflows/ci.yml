name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Run warning-visible tests
        run: pytest -q -W default

      - name: Run lint
        run: ruff check .

      - name: Run demo workflow
        run: feature-store-ops run-demo-workflow
